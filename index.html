<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Politie Herpositionering Simulator</title>

    <link
        rel="stylesheet"
        href="css/main.css">

</head>

<body>

<div class="simulator app-shell">

    <header class="topbar">

        <h1>🚔 Politie Herpositionering Simulator</h1>

        <div class="dashboard">

            <div class="card">
                <div id="availableCount">21</div>
                <small>Beschikbaar</small>
            </div>

            <div class="card">
                <div id="busyCount">0</div>
                <small>Onderweg</small>
            </div>

            <div class="card">
                <div id="incidentCount">0</div>
                <small>Meldingen</small>
            </div>

            <div class="card">
                <div id="coverageCount">100%</div>
                <small>Dekking</small>
            </div>

            <div class="card">
                <div id="roundCount">0/5</div>
                <small>Ronde</small>
            </div>

            <div class="card">
                <div id="averageTimeCount">-</div>
                <small>Gem. tijd</small>
            </div>

        </div>

    </header>

    <main class="main-content">

        <aside class="activity-panel">

            <h2>Activiteiten</h2>

            <div id="activityLog" class="activity-log"></div>

        </aside>

        <section id="map" class="map-panel map-container"></section>

        <aside class="dashboard-panel">

            <h2>Status</h2>

            <section class="session-config" aria-label="Sessieconfiguratie">
                <h2>Configuratie</h2>
                <p class="config-help">Pas voertuigaantallen aan vóór de sessiestart.</p>
                <div id="vehicleConfig" class="vehicle-config"></div>
                <div class="config-summary">Totaal: <strong id="vehicleConfigTotal">21</strong> voertuigen</div>
                <button id="applyConfigBtn" class="secondary-button">Configuratie toepassen</button>
                <button id="restoreDefaultsBtn" class="secondary-button">Standaardwaarden herstellen</button>
            </section>

            <div id="districtStatus"></div>

            <h2>Fase</h2>

            <div id="stepHint" class="step-hint">Start met een melding.</div>

            <h2>Evaluatie</h2>

            <div id="incidentHistory" class="incident-history"></div>

        </aside>

    </main>

    <footer class="control-bar" aria-label="Simulator bediening">

        <div class="process-controls" aria-label="Processtappen">
            <button id="incidentBtn">
                1. Melding
            </button>

            <button id="prisonBtn">
                2. Cel
            </button>

            <button id="travelBtn">
                3. Reistijd
            </button>

            <button id="dispatchBtn">
                4. Pak melding op
            </button>
        </div>

        <div class="utility-controls" aria-label="Hulpfuncties">
            <button id="resetBtn" class="reset-button" aria-label="Simulator resetten">
                ↺ Reset
            </button>
        </div>

    </footer>

</div>

<script
type="module"
src="js/app.js">
</script>

</body>

</html>
