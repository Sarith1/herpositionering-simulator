<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Politie Herpositionering Simulator</title>

    <link
        rel="stylesheet"
        href="css/main.css">

</head>

<body>

<div class="simulator">

    <header class="topbar">

        <h1>🚔 Politie Herpositionering Simulator</h1>

        <div class="dashboard">

            <div class="card">
                <div id="availableCount">21</div>
                <small>Beschikbaar</small>
            </div>

            <div class="card">
                <div id="underwayCount">0</div>
                <small>Onderweg</small>
            </div>

            <div class="card">
                <div id="repositioningCount">0</div>
                <small>Herpositionerend</small>
            </div>

            <div class="card">
                <div id="busyCount">0</div>
                <small>Tijdelijk bezet</small>
            </div>

            <div class="card">
                <div id="openIncidentCount">0</div>
                <small>Open meldingen</small>
            </div>

            <div class="card">
                <div id="handledIncidentCount">0</div>
                <small>Afgehandeld</small>
            </div>

            <div class="card">
                <div id="coverageCount">100%</div>
                <small>Dekking</small>
            </div>

        </div>

    </header>

    <main>

        <aside>

            <h2>Activiteiten</h2>

            <div id="activityLog"></div>

        </aside>

        <section id="map"></section>

        <aside>

            <h2>Status</h2>

            <div id="districtStatus"></div>

        </aside>

    </main>

    <footer>

        <button id="incidentBtn">
            1. Melding
        </button>

        <button id="prisonBtn">
            2. Cel
        </button>

        <button id="travelBtn">
            3. Reistijd
        </button>

        <button id="dispatchBtn">
            4. Pak melding op
        </button>

    </footer>

    <div id="gameOverOverlay" class="game-over-overlay">
        <div class="game-over-panel">
            <h2>MISSION FAILED</h2>
            <p>Niet alle districten zijn meer gedekt.</p>
            <button id="resetBtn">Opnieuw beginnen</button>
        </div>
    </div>

</div>

<script
type="module"
src="js/app.js">
</script>

</body>

</html>
