<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Politie Herpositionering Simulator</title>

    <link
        rel="stylesheet"
        href="css/main.css">

</head>

<body>

<div class="simulator">

    <header class="topbar">

        <h1>🚔 Politie Herpositionering Simulator</h1>

        <div class="dashboard">

            <div class="card">
                <div id="availableCount">21</div>
                <small>Beschikbaar</small>
            </div>

            <div class="card">
                <div id="busyCount">0</div>
                <small>Onderweg</small>
            </div>

            <div class="card">
                <div id="incidentCount">0</div>
                <small>Meldingen</small>
            </div>

            <div class="card">
                <div id="coverageCount">100%</div>
                <small>Dekking</small>
            </div>

            <div class="card">
                <div id="scoreCount">0</div>
                <small>Score</small>
            </div>

            <div class="card">
                <div id="roundCount">0/5</div>
                <small>Ronde</small>
            </div>

        </div>

    </header>

    <main>

        <aside>

            <h2>Activiteiten</h2>

            <div id="activityLog"></div>

        </aside>

        <section id="map"></section>

        <aside>

            <h2>Status</h2>

            <div id="districtStatus"></div>

            <h2>Fase</h2>

            <div id="stepHint" class="step-hint">Start met een melding.</div>

        </aside>

    </main>

    <footer>

        <button id="incidentBtn">
            1. Melding
        </button>

        <button id="prisonBtn">
            2. Cel
        </button>

        <button id="travelBtn">
            3. Reistijd
        </button>

        <button id="dispatchBtn">
            4. Pak melding op
        </button>


        <button id="resetBtn" class="secondary">
            Reset
        </button>

    </footer>

</div>

<script
type="module"
src="js/app.js">
</script>

</body>

</html>
